<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SQUADUP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Archivo:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0B10; --surface:#14141C; --surface2:#1B1B26; --line:#262633;
  --pink:#FF3D8A; --pink-deep:#C2186B;
  --gk:#E8B931; --def:#3D7BFF; --mid:#2EC96E; --att:#FF5247;
  --text:#F2F2F7; --muted:#8A8A99;
  --disp:'Barlow Condensed',sans-serif; --body:'Archivo',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--body);-webkit-tap-highlight-color:transparent}
body{max-width:500px;margin:0 auto;padding:16px 16px 150px;min-height:100vh;font-size:16px;font-weight:600}
.screen{min-height:86vh;display:flex;flex-direction:column;justify-content:center}
@media (min-width:700px){
  body{max-width:600px;font-size:17px}
  h1{font-size:64px!important}
  .codetext{font-size:84px!important}
  .lotRow .pcard{width:190px!important}
  .lotRow .ringWrap{width:190px!important;height:190px!important}
  .score{font-size:58px}
  .bidline{font-size:52px}
}
h1,h2,.disp{font-family:var(--disp);text-transform:uppercase;letter-spacing:.02em}
h1{font-size:34px;font-weight:800;margin:10px 0 2px;line-height:.95}
h2{font-size:27px;font-weight:700;margin:24px 0 10px}
.eyebrow{font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:16px;letter-spacing:.14em;color:var(--pink)}
.muted{color:var(--muted);font-size:16px;font-weight:500}
.flabel{display:block;font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:15px;letter-spacing:.1em;color:var(--muted);margin:12px 0 4px}
.bigbtn{width:100%;font-size:21px;padding:17px}
.blackbox{background:#000;border:1px solid var(--line);border-radius:18px;padding:18px 16px;margin:14px 0;text-align:center}
button{font-family:var(--disp);text-transform:uppercase;font-weight:700;letter-spacing:.04em;font-size:19px;
  padding:14px 19px;border:1px solid var(--line);border-radius:12px;background:var(--surface2);color:var(--text);cursor:pointer}
button:active{transform:scale(.97)}
button.primary{background:var(--pink);border-color:var(--pink);color:#fff;box-shadow:0 4px 24px rgba(255,61,138,.35)}
button:disabled{opacity:.35;pointer-events:none}
input{padding:15px 15px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--text);font-size:18px;width:100%;margin:5px 0;font-family:var(--body);font-weight:600}
input:focus{outline:2px solid var(--pink);border-color:transparent}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin:16px 0}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.grow{flex:1}
.center{text-align:center}
/* ---------- player card ---------- */
.pcard{position:relative;width:176px;aspect-ratio:3/4.3;border-radius:14px;overflow:hidden;margin:0 auto;
  border:1px solid rgba(255,255,255,.14);box-shadow:0 10px 34px rgba(0,0,0,.55)}
.pcard .bgGrad{position:absolute;inset:0}
.pcard.GK .bgGrad{background:radial-gradient(120% 90% at 50% 18%,#5a4710 0%,#241d08 58%,#101010 100%)}
.pcard.DEF .bgGrad{background:radial-gradient(120% 90% at 50% 18%,#16306b 0%,#0d1a3a 58%,#0e0e14 100%)}
.pcard.MID .bgGrad{background:radial-gradient(120% 90% at 50% 18%,#0e4d2a 0%,#0a2a18 58%,#0e120e 100%)}
.pcard.ATT .bgGrad{background:radial-gradient(120% 90% at 50% 18%,#62211c 0%,#33120f 58%,#15100f 100%)}
.pcard svg.sil{position:absolute;left:50%;top:16%;transform:translateX(-50%);width:64%;opacity:.92}
.pcard .posb{position:absolute;top:8px;left:8px;font-family:var(--disp);font-weight:800;font-size:16px;letter-spacing:.1em;
  padding:3px 9px;border-radius:7px;color:#0b0b10}
.pcard.GK .posb{background:var(--gk)} .pcard.DEF .posb{background:var(--def);color:#fff}
.pcard.MID .posb{background:var(--mid);color:#06140b} .pcard.ATT .posb{background:var(--att);color:#fff}
.pcard .nm{position:absolute;left:0;right:0;bottom:0;padding:22px 8px 9px;text-align:center;
  font-family:var(--disp);font-weight:800;text-transform:uppercase;font-size:17px;line-height:1;
  background:linear-gradient(transparent,rgba(0,0,0,.88) 45%)}
.pcard.sm{width:104px}.pcard.sm .nm{font-size:13px;padding-bottom:7px}.pcard.sm .posb{font-size:13px;padding:2px 7px}
/* ---------- start ready ---------- */
.startready{background:#4FC3F7;border-color:#4FC3F7;color:#06222e;box-shadow:0 4px 24px rgba(79,195,247,.4);animation:readyPulse 1.6s ease infinite}
@keyframes readyPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
/* ---------- bid flash ---------- */
.bidflash{animation:bidPulse .55s ease}
@keyframes bidPulse{0%{transform:scale(1);color:var(--text)}30%{transform:scale(1.14);color:var(--pink)}100%{transform:scale(1)}}
/* ---------- confetti ---------- */
.cf{position:fixed;top:-12px;width:10px;height:14px;z-index:60;pointer-events:none;animation:cfFall linear forwards}
@keyframes cfFall{to{transform:translateY(110vh) rotate(720deg)}}
/* ---------- my squad mini ---------- */
.minirow{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.mini{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--line);
  border-radius:8px;padding:4px 8px;font-size:13px;font-weight:600}
@media (prefers-reduced-motion: reduce){.cf{display:none}.startready{animation:none}.bidflash{animation:none}}
/* ---------- lot row ---------- */
.lotRow{display:flex;align-items:center;justify-content:center;gap:16px}
.ringSec{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-weight:800;font-size:42px;color:var(--text)}
.giveup{border-color:var(--att);color:var(--att);background:transparent;font-size:16px}
/* ---------- back button ---------- */
.backbtn{position:fixed;top:10px;left:max(10px,env(safe-area-inset-left));z-index:40;
  width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--surface2);border:1px solid var(--line);font-size:20px;padding:0;color:var(--text)}
/* ---------- lot reveal ---------- */
.revealCard .pcard{animation:cardBob var(--fade,450ms) cubic-bezier(.34,1.45,.5,1) forwards;opacity:0}
@keyframes cardBob{0%{opacity:0;transform:translateY(30px) scale(.88)}62%{opacity:1;transform:translateY(-7px) scale(1.04)}100%{opacity:1;transform:none}}
.cd{font-family:var(--disp);font-weight:800;font-size:86px;line-height:1;color:var(--pink);animation:cdPop .9s ease forwards}
@keyframes cdPop{0%{opacity:0;transform:scale(1.6)}25%{opacity:1;transform:scale(1)}85%{opacity:1}100%{opacity:0;transform:scale(.85)}}
@media (prefers-reduced-motion: reduce){.revealCard .pcard{animation:none;opacity:1;filter:none}.cd{animation:none}}
/* ---------- lobby code ---------- */
.codebox{background:#000;border:1px solid var(--line);border-radius:18px;padding:18px 16px;margin:12px 0;text-align:center}
.codetext{font-family:var(--disp);font-weight:800;font-size:58px;line-height:1;letter-spacing:.12em;margin:8px 0 12px;color:var(--text)}
.copybtn{background:var(--pink);border-color:var(--pink);color:#fff;width:100%;font-size:16px}
/* ---------- auction ---------- */
.ringWrap{position:relative;width:300px;height:300px;margin:0 auto}
.auctionWrap{display:flex;flex-direction:column;justify-content:center;flex:1;gap:16px}
.ringWrap svg.ring{position:absolute;inset:0;transform:rotate(-90deg);width:100%;height:100%}
.ringWrap .pcard{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.bidline{font-family:var(--disp);font-weight:800;font-size:42px;line-height:1;letter-spacing:.01em}
.bidline small{font-size:18px;color:var(--muted);font-weight:700}
.bidder{color:var(--pink);font-weight:700;font-size:16px}
.bidbar{position:fixed;left:16px;right:16px;bottom:max(16px,env(safe-area-inset-bottom));
  max-width:468px;margin:0 auto;display:flex;flex-direction:column;
  background:rgba(20,20,28,.97);border:1px solid var(--line);border-radius:18px;
  padding:14px;box-shadow:0 10px 40px rgba(0,0,0,.6)}
@media (min-width:700px){.bidbar{max-width:568px}}
input[type=range]{-webkit-appearance:none;appearance:none;height:8px;border-radius:6px;background:var(--surface2);outline:none;border:1px solid var(--line);padding:0;margin:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:30px;height:30px;border-radius:50%;background:var(--pink);border:3px solid #fff;box-shadow:0 2px 10px rgba(255,61,138,.5);cursor:pointer}
input[type=range]::-moz-range-thumb{width:30px;height:30px;border-radius:50%;background:var(--pink);border:3px solid #fff;cursor:pointer}
.budgets{display:flex;gap:6px;overflow-x:auto;padding:2px 0;margin:4px 0}
.bchip{flex:0 0 auto;background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:15px}
.bchip b{font-family:var(--disp);font-size:15px}
.bchip.me{border-color:var(--pink)}
.bchip.done{opacity:.45}
/* ---------- reveals ---------- */
.score{font-family:var(--disp);font-weight:800;font-size:46px;line-height:.95;text-transform:uppercase}
.score .gl{color:var(--pink)}
.featuredTag{display:inline-block;background:var(--pink);color:#fff;font-family:var(--disp);font-weight:800;
  font-size:12px;letter-spacing:.16em;padding:3px 10px;border-radius:6px;text-transform:uppercase}
.evt{font-size:16px;padding:8px 0;border-bottom:1px solid var(--line);opacity:0;animation:pop .4s forwards}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tick{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
/* ---------- tables / form ---------- */
table{width:100%;border-collapse:collapse;font-size:15px}
td,th{padding:11px 6px;border-bottom:1px solid var(--line);text-align:left;font-size:16px}
th{font-family:var(--disp);text-transform:uppercase;font-size:12px;letter-spacing:.1em;color:var(--muted)}
tr.hu td{background:rgba(255,61,138,.06)}
tr.me td{background:rgba(255,61,138,.14)}
.formchip{display:inline-block;min-width:30px;text-align:center;font-family:var(--disp);font-weight:800;border-radius:8px;padding:2px 6px;color:#0b0b10}
.f-g{background:#39d97c}.f-y{background:#ffd23d}.f-o{background:#ff9838}.f-r{background:#ff5247;color:#fff}
.pos{display:inline-block;font-family:var(--disp);font-weight:800;font-size:11px;letter-spacing:.08em;padding:2px 6px;border-radius:5px;margin-right:7px;color:#0b0b10}
.pos.GK{background:var(--gk)}.pos.DEF{background:var(--def);color:#fff}.pos.MID{background:var(--mid)}.pos.ATT{background:var(--att);color:#fff}
/* ---------- pick ---------- */
.pickgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pbtn{display:flex;align-items:center;gap:5px;padding:13px 11px;border-radius:12px;border:1px solid var(--line);
  background:var(--surface2);color:var(--text);font-family:var(--body);font-size:15px;font-weight:600;text-transform:none;letter-spacing:0;text-align:left}
.pbtn.sel{border-color:var(--pink);box-shadow:0 0 0 1px var(--pink),0 4px 18px rgba(255,61,138,.25)}
.pbtn.inj{opacity:.4}
.fbtn{font-size:16px;padding:10px 14px;background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:11px}
.fbtn.sel{background:var(--pink);border-color:var(--pink);color:#fff}
.slot .plus{font-size:24px;line-height:1;color:var(--muted);opacity:.7;margin-bottom:3px}
.autobtn{width:100%;margin-top:10px;border-color:#4FC3F7;color:#4FC3F7;background:transparent;font-size:17px}
.stepbtn{font-family:var(--disp);font-weight:800;font-size:20px;min-width:54px;padding:12px 0;background:var(--surface2);border:1px solid var(--line);border-radius:12px;color:#fff}
.stepbtn:active{background:var(--pink);border-color:var(--pink)}
/* ---------- legend card ---------- */
.pcard.legend .bgGrad{background:radial-gradient(120% 90% at 50% 18%,#fffdf4 0%,#f5ecd0 58%,#e8d9a8 100%)}
.pcard.legend{border:2px solid #C9A227;box-shadow:0 0 24px rgba(201,162,39,.45)}
.pcard.legend .nm{color:#5b4708;background:linear-gradient(transparent,rgba(255,250,235,.95) 45%)}
.pcard.legend svg.sil g{fill:#b99c3f}
.pcard.legend .posb{background:#C9A227!important;color:#fff!important}
.hintchip{position:absolute;top:8px;right:8px;font-family:var(--disp);font-weight:800;font-size:19px;letter-spacing:.04em;
  background:rgba(0,0,0,.62);border:1px solid var(--line);border-radius:8px;padding:3px 9px;color:#fff}
/* ---------- winter hub ---------- */
.tabrow{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;padding:12px 17px;border-radius:12px;border:1px solid var(--line);background:var(--surface2);
  font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:17px;letter-spacing:.05em;color:var(--muted)}
.tab.sel{border-color:var(--pink);color:var(--text);background:var(--surface)}
.formchip{font-family:var(--disp);font-weight:800;font-size:17px;padding:4px 10px;border-radius:8px;min-width:52px;text-align:center}
.f-g{background:#123d24;color:#5BE08A}.f-y{background:#3d3712;color:#F2D24B}.f-o{background:#3d2712;color:#F0A24B}.f-r{background:#3d1212;color:#F06B6B}.f-n{background:var(--surface2);color:var(--muted)}
.unitbox{flex:1;background:#000;border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center}
.unitbox .uv{font-family:var(--disp);font-weight:800;font-size:36px}
.spinbtn{border-color:#C9A227;color:#C9A227;background:transparent;font-size:17px;padding:10px 13px;min-width:50px}
.tierbanner{font-family:var(--disp);font-weight:800;text-transform:uppercase;font-size:42px;letter-spacing:.04em}
.ceremonyTxt{font-family:var(--disp);font-weight:800;text-transform:uppercase;font-size:38px;letter-spacing:.03em;opacity:0;animation:cerIn .8s ease forwards}
@keyframes cerIn{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}
.podiumRow{display:flex;align-items:baseline;gap:12px;opacity:0;animation:cerIn .7s ease forwards;margin:10px 0}
.podiumPos{font-family:var(--disp);font-weight:800;font-size:30px;color:var(--muted);min-width:52px}
.podiumName{font-family:var(--disp);font-weight:800;font-size:32px}
.champName{font-family:var(--disp);font-weight:800;font-size:52px;line-height:1.05;color:#C9A227;text-shadow:0 0 26px rgba(201,162,39,.55);opacity:0;animation:cerIn .9s ease forwards}
.spinOverlay{position:fixed;inset:0;z-index:80;background:rgba(5,5,9,.95);backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .45s ease}
.spinOverlay.show{opacity:1}
.spinPulse{font-family:var(--disp);font-weight:800;text-transform:uppercase;font-size:30px;color:var(--muted);
  animation:spinPulse 1s ease infinite}
@keyframes spinPulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}
.legendGlow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(60% 45% at 50% 52%,rgba(201,162,39,.28),transparent 70%)}
.tabwrap{position:sticky;top:0;z-index:30;background:linear-gradient(#0B0B10 78%,transparent);padding:8px 0 4px;margin:0 -2px}
.tab.sel{border-color:var(--pink);color:#fff;background:var(--pink)}
.t-worse{color:var(--att)}.t-better{color:#5BE08A}.t-great{color:#4FC3F7}.t-legend{color:#C9A227;text-shadow:0 0 18px rgba(201,162,39,.6)}
/* ---------- pitch squad selection ---------- */
.pitch{background:linear-gradient(180deg,#0B2415,#07180D);border:1px solid rgba(46,201,110,.3);
  border-radius:18px;padding:18px 8px;margin:14px 0;position:relative;box-shadow:inset 0 0 50px rgba(0,0,0,.45)}
.pitch:before{content:'';position:absolute;inset:10px;border:1px solid rgba(255,255,255,.07);border-radius:12px;pointer-events:none}
.prow{display:flex;justify-content:center;gap:10px;margin:9px 0}
.slot{width:100px;min-height:116px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px dashed var(--line);color:var(--muted);font-family:var(--disp);font-weight:700;font-size:14px;letter-spacing:.08em;cursor:pointer}
.slot.filled{border:2px solid var(--pink);background:var(--surface2);color:var(--text);padding:6px 4px}
.slot .sname{font-size:14px;line-height:1.05;text-align:center;text-transform:uppercase;margin-top:4px}
.benchrow{display:flex;gap:8px;flex-wrap:wrap}
.bp{display:flex;align-items:center;gap:6px;padding:12px;border-radius:12px;border:1px solid var(--line);
  background:var(--surface2);font-size:16px;font-weight:600;cursor:pointer;font-family:var(--body);text-transform:none;letter-spacing:0;color:var(--text)}
.bp.used{opacity:.3;pointer-events:none}
.bp.inj{opacity:.35;pointer-events:none}
/* ---------- awards ---------- */
.trophy{font-size:54px;line-height:1}
.award{display:flex;justify-content:space-between;gap:8px;padding:12px 0;border-bottom:1px solid var(--line);font-size:15px}
.award b{font-family:var(--disp);text-transform:uppercase;letter-spacing:.04em}
.paused{position:fixed;top:0;left:0;right:0;background:var(--pink-deep);color:#fff;text-align:center;
  font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:7px;z-index:50}
@media (prefers-reduced-motion: reduce){.evt{animation:none;opacity:1}}
</style>
</head>
<body>
<div id="pausebar" class="paused" style="display:none"></div>
<div id="app"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const s = io();
const VERSION = 'v1.19';
const $ = (h) => { document.getElementById('app').innerHTML = h; window.scrollTo(0,0); };
const $k = (h) => { const y = window.scrollY; document.getElementById('app').innerHTML = h; window.scrollTo(0, y); };
let ME = { id:null, code:null, name:null, budget:100 };
let A = null, timerInt = null, pickState = null, lastTable = null;

function backBtn(inGame){
  return `<button class="backbtn" onclick="goBack(${inGame?1:0})">‹</button>`;
}
function goBack(inGame){
  if(inGame && !confirm('Leave the game? You can rejoin with the same code and name.')) return;
  location.reload();
}
const esc = (t) => String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const num = (name) => 1 + ([...name].reduce((a,c)=>a+c.charCodeAt(0),0) % 29);
const SIL = `<svg class="sil" viewBox="0 0 100 110"><g fill="#9a9aa6"><circle cx="50" cy="34" r="20"/><path d="M14 110 C14 76 30 62 50 62 C70 62 86 76 86 110 Z"/></g><g fill="rgba(255,255,255,.10)"><circle cx="44" cy="28" r="20"/></g></svg>`;

function cardHTML(p, sm){
  return `<div class="pcard ${p.pos} ${sm?'sm':''} ${p.legend?'legend':''}">
    <div class="bgGrad"></div>${SIL}
    <div class="posb">${p.pos}</div>
    ${p.hint?`<div class="hintchip">${p.hint}</div>`:''}
    <div class="nm">${esc(p.name)}</div>
  </div>`;
}

/* ---------------- HOME ---------------- */
function home(){
  $(`<div class="screen center" id="homeScr">
  <h1 style="font-size:64px;letter-spacing:.01em"><span style="color:var(--pink)">SQUAD</span><span style="color:#fff">UP</span></h1>
  <div class="muted" style="margin-bottom:26px">Bid on real players. Hidden ratings.<br>Survive the season.</div>
  <button class="primary bigbtn" onclick="showSetup('create')">Create a lobby</button>
  <button class="bigbtn" style="margin-top:12px" onclick="showSetup('join')">Join a lobby</button>
  <div id="rejoinSlot" style="width:100%"></div>
  <div class="muted" style="margin-top:26px;font-size:13px;opacity:.6">${VERSION}</div>
  </div>`);
  try{
    const sv=JSON.parse(localStorage.getItem('squp')||'null');
    if(sv&&sv.name) s.emit('findMyGames',{name:sv.name},(r)=>{
      const el=document.getElementById('rejoinSlot');
      if(!el||!r||!r.games||!r.games.length) return;
      el.innerHTML = r.games.map(gm=>`<button class="bigbtn" style="margin-top:12px;border-color:#4FC3F7;color:#4FC3F7"
        onclick="rejoinAs('${gm.code}')">↻ Rejoin game ${gm.code} as ${esc(sv.name)}</button>`).join('');
    });
  }catch(e){}
}
function rejoinAs(code){
  const sv=JSON.parse(localStorage.getItem('squp')||'null'); if(!sv) return;
  s.emit('joinLobby',{code,name:sv.name,club:''},(r)=>{
    if(r.error) return toast(r.error);
    onJoined(r,sv.name);
    if(!r.snapshot) toast('Back in — waiting for the next event');
  });
}
function showSetup(mode){
  $(`<button class="backbtn" onclick="home()">‹</button>
  <div class="screen">
  <div class="eyebrow">${mode==='create'?'Create a lobby':'Join a lobby'}</div>
  <h1>${mode==='create'?'Your details':'Enter the code'}</h1>
  <div class="panel" style="padding:22px">

/* ---------------- PICK STARTERS ---------------- */
const FORMSETS=[[1,2,1],[2,1,1],[1,1,2],[2,2,0],[2,0,2],[3,1,0],[3,0,1],[1,3,0],[1,0,3],[4,0,0]];
let CURFORM=[1,2,1];
function slotsFor(d,m2,a){
  return [].concat(Array(a).fill('ATT'),Array(m2).fill('MID'),Array(d).fill('DEF'),['GK'])
    .map(pos=>({pos,player:null,ppos:pos}));
}
function feasibleForms(avail){
  const c={DEF:avail.filter(p=>p.pos==='DEF').length, MID:avail.filter(p=>p.pos==='MID').length, ATT:avail.filter(p=>p.pos==='ATT').length};
  return FORMSETS.filter(([d,m2,a])=>c.DEF>=d&&c.MID>=m2&&c.ATT>=a);
}
function formChips(avail, onpick){
  const ok=feasibleForms(avail);
  const inj = avail.length < 6 ? `<div class="muted" style="font-size:13px;margin:-3px 0 8px;color:#FFB347">🤕 Injury limits your options — only ${ok.length} shape${ok.length===1?'':'s'} possible with ${avail.length} fit players.</div>` : '';
  return `<div class="row" style="flex-wrap:wrap;gap:7px;margin-bottom:8px">${ok.map(([d,m2,a])=>
    `<button class="fbtn ${CURFORM[0]===d&&CURFORM[1]===m2&&CURFORM[2]===a?'sel':''}" style="padding:9px 11px" onclick="${onpick}(${d},${m2},${a})">${d}-${m2}-${a}</button>`).join('')}</div>${inj}`;
}
function rebuildSlots(oldSlots, avail, d, m2, a){
  const placed=oldSlots.filter(x=>x.player).map(x=>({name:x.player,pos:x.ppos}));
  const slots=slotsFor(d,m2,a);
  for(const pl of placed){
    if(!avail.some(p=>p.name===pl.name)) continue;
    const sl=slots.find(x=>x.pos===pl.pos && !x.player);
    if(sl){ sl.player=pl.name; sl.ppos=pl.pos; }
  }
  return slots;
}
function unitBars(slots, avail){
  const fcOf=(n)=>{const p=avail.find(x=>x.name===n);return p&&p.fc26;};
  const unit=(poss)=>{
    const vals=slots.filter(x=>x.player&&poss.includes(x.ppos)).map(x=>fcOf(x.player)).filter(Boolean);
    return vals.length?Math.round(vals.reduce((s,v)=>s+v,0)/vals.length):null;
  };
  const D=unit(['GK','DEF']), M=unit(['MID']), A=unit(['ATT']);
  const cell=(lbl,v)=>`<div style="flex:1;text-align:center"><div class="muted" style="font-size:13px">${lbl}</div>
    <div style="font-family:var(--disp);font-weight:800;font-size:24px;color:${v?'#fff':'#FF5470'}">${v??'—'}</div></div>`;
  return `<div class="blackbox" style="display:flex;gap:6px;padding:10px 6px;margin-bottom:8px">${cell('DEF',D)}${cell('MID',M)}${cell('ATT',A)}</div>
  ${(!D||!M||!A)?`<div class="muted" style="font-size:13px;margin:-2px 0 8px;color:#FF5470">Missing a unit hurts your ratings — balanced teams do better.</div>`:''}`;
}

function initSlots(){

}
function renderPick(){

  const used = p.slots.filter(x=>x.player).map(x=>x.player);

        : `<div class="slot"><span class="plus">＋</span>${pos}</div>`;}).join('')}</div>`;
  }).join('');
  const filled = used.length;

  <div class="eyebrow">${p.half==='first'?'Pre-season':'Second half'}</div>

  ${unitBars(p.slots, p.squad)}
  <div class="pitch">${rows}</div>
  <button class="autobtn" onclick="autoXI()">⚡ Auto-fill XI</button>
  <h2 style="margin-top:6px">Squad — tap to place</h2>
  <div class="benchrow">
    ${p.squad.map(pl=>`<button class="bp ${used.includes(pl.name)?'used':''} ${pl.injured?'inj':''}"
      onclick="placePlayer(this.dataset.n,this.dataset.p)" data-n="${esc(pl.name)}" data-p="${pl.pos}">
      <span class="pos ${pl.pos}">${pl.pos}</span>${esc(pl.name)}${pl.fc26?` <b style="opacity:.85">${pl.fc26}</b>`:''}${pl.injured?' 🤕':''}</button>`).join('')}
  </div>
  <div class="muted" style="margin-top:8px">Anyone not placed starts on the bench.</div>

function autoXI(){
  s.emit('suggestXI',(r)=>{
    if(r&&r.error) return toast(r.error);
    const build=(lookup)=>{
      const ps=r.starters.map(lookup).filter(Boolean);
      const d=ps.filter(p=>p.pos==='DEF').length, m2=ps.filter(p=>p.pos==='MID').length, a=ps.filter(p=>p.pos==='ATT').length;
      CURFORM=[d,m2,a];
      const slots=slotsFor(d,m2,a);
      for(const p2 of ps){ const sl=slots.find(x=>x.pos===p2.pos&&!x.player); if(sl){ sl.player=p2.name; sl.ppos=p2.pos; } }
      return slots;
    };
    if(pickState){ pickState.slots=build(n=>pickState.squad.find(q=>q.name===n)); renderPick(); }
    else if(W && WSLOTS){
      const rv=W.review.find(x=>x.manager===ME.name);
      WSLOTS=build(n=>rv.players.find(q=>q.name===n)); renderWinter();
    }
  });
}
function pickForm(d,m2,a){
  CURFORM=[d,m2,a];
  pickState.slots=rebuildSlots(pickState.slots, pickState.squad.filter(x=>!x.injured), d,m2,a);

let W=null, WTAB=null, WSLOTS=null, WFORM=null;
function applyWinter(w){
  MATCHLIVE=false;
  if(w.sackings.some(x=>x.manager===ME.name)) ME.sacked=true;
  const hadHub = !!(W && WSLOTS); // reconnect mid-picking: keep placed slots
  W=w;
  if(!hadHub) WTAB=ME.name;
  const mine=w.review.find(r=>r.manager===ME.name);
  if(mine && !hadHub){
    const av=mine.players.filter(x=>!x.injured);
    const st=(mine.starters||[]).map(n=>av.find(p=>p.name===n)).filter(Boolean);
    if(st.length){
      // carry your first-half XI straight in; injured player's slot stays open in their old shape
      const all=(mine.starters||[]).map(n=>mine.players.find(p=>p.name===n)).filter(Boolean);
      CURFORM=[all.filter(p=>p.pos==='DEF').length, all.filter(p=>p.pos==='MID').length, all.filter(p=>p.pos==='ATT').length];
      if(!feasibleForms(av).some(f=>f[0]===CURFORM[0]&&f[1]===CURFORM[1]&&f[2]===CURFORM[2])){
        const ok=feasibleForms(av);
        CURFORM = ok.some(f=>f[0]===1&&f[1]===2&&f[2]===1)?[1,2,1]:(ok[0]||CURFORM);
      }
      WSLOTS=slotsFor(...CURFORM);
      for(const p of st){ const sl=WSLOTS.find(x=>x.pos===p.pos&&!x.player); if(sl){ sl.player=p.name; sl.ppos=p.pos; } }
    } else {
      const ok=feasibleForms(av);
      CURFORM = ok.some(f=>f[0]===1&&f[1]===2&&f[2]===1)?[1,2,1]:(ok[0]||[1,2,1]);
      WSLOTS = slotsFor(...CURFORM);
    }
  }
  if(!mine) WTAB = w.review.length ? w.review[0].manager : null;
  renderWinter();
}
s.on('winter',applyWinter);
s.on('winterUpdate',(u)=>{ if(W){ W.review=u.review; renderWinter(); } });
s.on('respinResult',(x)=>{
  if(!W) return;
  W.review=x.review;
  if(x.spins) W.spins=x.spins;
  const me = x.manager===ME.name;
  if(me && WSLOTS){
    for(const sl of WSLOTS) if(sl.player===x.oldPlayer.name){ sl.player=null; sl.ppos=null; }
    const free=WSLOTS.find(s2=>s2.pos===x.newPlayer.pos && !s2.player);
    if(free){ free.player=x.newPlayer.name; free.ppos=x.newPlayer.pos; }
  }
  if(me){ showSpinResult(x); } else {
    renderWinter();
    toast(x.tier==='legend' ? '👑 '+esc(x.manager)+' spun a LEGEND: '+esc(x.newPlayer.name)+'!' : esc(x.manager)+' respun '+esc(x.oldPlayer.name)+' → '+esc(x.newPlayer.name));
  }
});

    ${a.bestBargain?`<div class="award"><b>💎 Best Bargain</b><span>${esc(a.bestBargain.player)} £${a.bestBargain.price}m (${esc(a.bestBargain.manager)})</span></div>`:''}
    ${a.biggestFlop?`<div class="award"><b>🗑 Biggest Flop</b><span>${esc(a.biggestFlop.player)} £${a.biggestFlop.price}m (${esc(a.biggestFlop.manager)})</span></div>`:''}
    ${a.spinOfSeason?`<div class="award"><b>🎰 Spin of the Season</b><span>${esc(a.spinOfSeason.newPlayer)}${a.spinOfSeason.tier==='legend'?' 👑':''} (${esc(a.spinOfSeason.manager)})</span></div>`:''}
  </div>
  ${f.stats?statPanels(f.stats):''}
  <button class="primary" style="width:100%;margin-top:14px" onclick="location.reload()">Run it back</button>`);
}

/* ---------------- CONNECTION ---------------- */
s.on('paused',(p)=>{ isPaused=true; const b=document.getElementById('pausebar');
  b.textContent = p.byHost ? '⏸ Paused' : `⏸ ${p.manager} disconnected — paused`;
  b.style.display='block'; });
let isPaused=false;
s.on('hostChanged',(x)=>{
  ME.isHost = x.hostId===ME.id;
  toast(esc(x.name)+' is now host');
});
s.on('resumed',(r)=>{ isPaused=false; const b=document.getElementById('pausebar'); b.style.display='none'; hostPausedLocal=false;
  if(A&&r&&r.deadline) A.deadline=r.deadline; });
s.on('autoFill',(x)=>{ if(x.manager===ME.name){ MYSQUAD.push({name:x.player,pos:x.pos}); toast(`Auto-fill: ${x.player} (${x.pos})`);} });
s.on('startersLocked',(x)=>{
  if(!lockedManagers.includes(x.manager)) lockedManagers.push(x.manager);
  const el=document.getElementById('lockedlist');
  if(el) el.innerHTML=lockedManagers.map(n=>`<div>🟢 ${esc(n)}</div>`).join('');
});
s.on('connect',()=>{
  // transient socket blip mid-game: silently reclaim seat by code + name
  if(ME.code && ME.name) s.emit('joinLobby',{code:ME.code,name:ME.name,club:''},(r)=>{
    if(r.ok){ ME.id=r.managerId; if(r.snapshot) restoreFromSnapshot(r.snapshot); }
  });
});
home();
</script>
</body>
</html>
